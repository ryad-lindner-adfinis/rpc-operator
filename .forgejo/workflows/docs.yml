name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/user/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "api/v1alpha1/**"
      - "hack/docs-check-reference*"
      - ".forgejo/workflows/docs.yml"

permissions:
  contents: read

jobs:
  build:
    name: mkdocs build --strict
    runs-on: docker
    container:
      image: forgejo.thecloudroute.com/tom/rpc-operator/ci:5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install MkDocs toolchain
        # PEP 668: the CI image's Python is externally managed (Ubuntu 24.04).
        # This is a throwaway CI container, so installing into the system env as
        # root is fine — keeps docs deps decoupled from the image (no rebuild on
        # bumps). --root-user-action=ignore silences pip's cosmetic root warning.
        run: pip3 install --break-system-packages --root-user-action=ignore --quiet -r requirements-docs.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

  reference-drift:
    name: docs-check-reference
    runs-on: docker
    container:
      image: forgejo.thecloudroute.com/tom/rpc-operator/ci:5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run drift check
        run: go run ./hack/docs-check-reference.go
