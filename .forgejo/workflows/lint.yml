name: Lint

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on:
      - docker
      - arm64
    container:
      image: forgejo.thecloudroute.com/tom/rpc-operator/ci:6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run linter
        run: golangci-lint run
