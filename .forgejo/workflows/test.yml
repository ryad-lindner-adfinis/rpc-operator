name: Tests

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    name: Go Tests
    runs-on: docker
    container:
      image: forgejo.thecloudroute.com/tom/rpc-operator/ci:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run tests
        run: make test-ci
