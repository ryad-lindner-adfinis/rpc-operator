site_name: RPC Operator
site_description: User documentation for the Redpanda Connect Operator.
site_url: https://insidegreen.github.io/rpc-operator/
repo_url: https://github.com/insidegreen/rpc-operator
repo_name: insidegreen/rpc-operator
edit_uri: edit/main/docs/user/
docs_dir: docs/user
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mermaid2

nav:
  - Introduction:
      - What is the RPC Operator?: index.md
      - Who should read what?: audience.md
      - Architecture at a glance: architecture.md
  - Getting Started:
      - Prerequisites: getting-started/prerequisites.md
      - Install via Helm: getting-started/install.md
      - Deploy your first Pipeline: getting-started/first-pipeline.md
      - Verify and next steps: getting-started/verify.md
  - Operating the Operator:
      - Helm values reference: operating/helm-values.md
      - Authentication modes: operating/auth.md
      - OIDC SSO: operating/oidc.md
      - Namespace allowlist: operating/namespace-allowlist.md
      - Image registry: operating/pull-secrets.md
      - Prometheus integration: operating/prometheus.md
      - Upgrades and uninstall: operating/upgrade-uninstall.md
  - Authoring Pipelines:
      - Pipeline anatomy: authoring/anatomy.md
      - Secrets via secretKeyRef: authoring/secrets.md
      - Deploying and redeploying: authoring/deploy.md
      - Stop and re-run: authoring/stop-rerun.md
  - PipelineClusters & Streams:
      - When to use a PipelineCluster: clusters/when-to-use.md
      - Defining a PipelineCluster: clusters/defining.md
      - Running pipelines on a cluster: clusters/cluster-ref.md
      - Migrating between clusters: clusters/migrating.md
  - Operations:
      - Reading logs: operations/logs.md
      - Metrics and PodMonitor: operations/metrics.md
      - Troubleshooting: operations/troubleshooting.md
  - Reference:
      - Pipeline CRD: reference/pipeline-crd.md
      - PipelineCluster CRD: reference/pipelinecluster-crd.md
      - Helm values: reference/helm-values.md
      - Operator CLI flags: reference/cli-flags.md

copyright: Copyright 2026 Inside Green
