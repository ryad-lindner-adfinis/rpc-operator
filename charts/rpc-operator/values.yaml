# rpc-operator Helm chart defaults.
# DEV-scope: no authentication on the UI. Don't expose publicly.

image:
  repository: forgejo.thecloudroute.com/tom/rpc-operator
  tag: ""              # Empty -> Chart.appVersion. Override to "main" for nightly DEV builds.
  pullPolicy: IfNotPresent

# Image-pull secrets for private registries (Forgejo registry needs one):
#   kubectl create secret docker-registry forgejo-pull \
#     --docker-server=forgejo.thecloudroute.com \
#     --docker-username=<user> --docker-password=<PAT> -n <release-ns>
imagePullSecrets: []
# - name: forgejo-pull

replicaCount: 1

# Operator command-line configuration
operator:
  # Prometheus base URL for the UI's throughput/error-rate graph (F15).
  # Empty disables that graph. The operator itself runs fine without it.
  # Example: http://prometheus-operated.cattle-monitoring-system.svc:9090
  prometheusUrl: ""

  # F21: Namespace allowlist. Empty list (default) = operator watches all
  # namespaces (cluster-wide). Set to a list of namespace names to restrict
  # both the controller cache scope and the API. The operator's
  # ServiceAccount still uses its existing ClusterRole; per-namespace Roles
  # are a follow-up.
  # Example:
  #   watchNamespaces:
  #     - data-eng
  #     - analytics
  watchNamespaces: []

# F43: Auth-Master-Switch. Default an (v0.8+). Bei `enabled: false` verhaelt
# sich der Operator identisch zu v0.7 (kein Login, alle Requests laufen unter
# Operator-SA, F21-Allowlist bleibt aktiv). NIE mit Public-Ingress kombinieren
# ohne externes Auth-Proxy.
auth:
  enabled: true

# F42: Anonymous Read-Only-Modus. Setzt `auth.enabled: true` voraus
# (Helm-Render schlaegt sonst mit `fail` ab — Modi A und C sind exklusiv).
#
# `read.enabled: true` schaltet GET-Pfade auf Pipelines/Catalog/Namespaces/Metrics
# fuer unauthentifizierte Requests frei. Writes (POST/PUT/DELETE) bleiben tokenpflichtig.
# Backend laeuft fuer anonyme Reads unter der Operator-SA innerhalb der F21-Allowlist.
#
# `logs.enabled: true` schaltet zusaetzlich den Live-Log-Stream (`/logs` WebSocket) frei.
# Separat, weil Log-Inhalte Payloads/Secrets enthalten koennen.
anonymous:
  read:
    enabled: false
  logs:
    enabled: false

# F20b: OIDC PKCE login (additive on F20a Bearer-Token-Layer). Public OAuth 2.0
# client — kein client_secret noetig, PKCE S256 schuetzt den Auth-Code.
#
# Voraussetzung: Der Kubernetes-Apiserver muss mit denselben Werten konfiguriert
# sein (`--oidc-issuer-url=<issuer>`, `--oidc-client-id=<clientID>`), sonst
# weist er den `id_token` mit 401 zurueck.
#
# `redirectURL` und `uiRedirectURL` muessen aus dem Browser erreichbar sein.
# Bei Ingress: typischerweise `https://<ingress.host>/api/v1/auth/callback`
# bzw. `https://<ingress.host>/`. Der Wert in `redirectURL` MUSS exakt der
# beim IdP registrierten Redirect-URI entsprechen.
#
# `scopes` enthaelt standardmaessig `offline_access` — ohne dieses Scope
# emittieren die meisten IdPs keinen Refresh-Token, der Backend-Cache bleibt
# dann leer und `/auth/refresh` failt immer (UI fallback: erneuter SSO-Login).
oidc:
  enabled: false
  issuer: ""             # z.B. https://keycloak.example.com/realms/platform
  clientID: ""           # OAuth 2.0 Client-ID (public client mit PKCE)
  scopes: "openid,email,offline_access"
  redirectURL: ""        # https://<host>/api/v1/auth/callback (muss am IdP registriert sein)
  uiRedirectURL: ""      # https://<host>/ (Browser landet hier nach Callback; leer = "/")

# Leader election adds resilience for >1 replica. v0.7 default off
# (single-pod DEV setup; enabling requires extra Role for leases that this
# chart does not yet ship).
leaderElection:
  enabled: false

# Operator self-metrics on :8443 HTTPS with authn/authz. Off by default
# for DEV - the PodMonitor-per-pipeline (F36) is unaffected.
metrics:
  enabled: false

service:
  type: ClusterIP
  port: 8082          # API + embedded UI

# Optional Ingress for the UI. Default access is `kubectl port-forward`.
# Don't enable without external auth in front (e.g. OAuth2-Proxy).
ingress:
  enabled: false
  className: ""
  host: rpc-operator.example.com
  annotations: {}
  # nginx.ingress.kubernetes.io/proxy-body-size: 1m
  tls: []
  # - secretName: rpc-operator-tls
  #   hosts: [rpc-operator.example.com]

# Sample pipelines installed into the release namespace. Useful for the
# first-run smoke test. Turn off once you have your own pipelines.
examples:
  enabled: false

serviceAccount:
  create: true
  name: ""           # empty -> derived from fullname

# Operator pod resources
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector:
  kubernetes.io/arch: amd64   # Operator image is amd64-only; remove once arm64 builds ship
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

# PodSecurityStandard: restricted (matches existing manager.yaml)
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
