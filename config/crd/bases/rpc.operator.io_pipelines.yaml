---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pipelines.rpc.operator.io
spec:
  group: rpc.operator.io
  names:
    kind: Pipeline
    listKind: PipelineList
    plural: pipelines
    singular: pipeline
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.podName
      name: Pod
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Pipeline is the Schema for the pipelines API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PipelineSpec defines the desired state of Pipeline.
            properties:
              clusterRef:
                description: |-
                  ClusterRef names a PipelineCluster in the same namespace. When set, the
                  pipeline is deployed as a stream into that cluster instead of getting its
                  own pod. Empty = one-pod model (unchanged). F47 Phase 2.
                type: string
              image:
                default: docker.redpanda.com/redpandadata/connect:4
                type: string
              input:
                description: ComponentSpec describes one Redpanda Connect component
                  (input, processor, or output).
                properties:
                  config:
                    description: Config is passed verbatim as the body of the component
                      in the rendered YAML.
                    x-kubernetes-preserve-unknown-fields: true
                  label:
                    description: |-
                      Label is the Benthos component label used for metrics and tracing.
                      Required for processors; optional for input and output.
                    type: string
                  type:
                    description: Type is the RPC component name, e.g. "generate",
                      "kafka", "mapping", "stdout".
                    type: string
                required:
                - type
                type: object
              output:
                description: ComponentSpec describes one Redpanda Connect component
                  (input, processor, or output).
                properties:
                  config:
                    description: Config is passed verbatim as the body of the component
                      in the rendered YAML.
                    x-kubernetes-preserve-unknown-fields: true
                  label:
                    description: |-
                      Label is the Benthos component label used for metrics and tracing.
                      Required for processors; optional for input and output.
                    type: string
                  type:
                    description: Type is the RPC component name, e.g. "generate",
                      "kafka", "mapping", "stdout".
                    type: string
                required:
                - type
                type: object
              processors:
                items:
                  description: ComponentSpec describes one Redpanda Connect component
                    (input, processor, or output).
                  properties:
                    config:
                      description: Config is passed verbatim as the body of the component
                        in the rendered YAML.
                      x-kubernetes-preserve-unknown-fields: true
                    label:
                      description: |-
                        Label is the Benthos component label used for metrics and tracing.
                        Required for processors; optional for input and output.
                      type: string
                    type:
                      description: Type is the RPC component name, e.g. "generate",
                        "kafka", "mapping", "stdout".
                      type: string
                  required:
                  - type
                  type: object
                type: array
              projectRef:
                description: |-
                  ProjectRef opts this pipeline into a PipelineProject. Mutually exclusive
                  with clusterRef. When set, the operator places the pipeline onto the
                  project's managed PipelineCluster (<project>-cluster) and rewrites its
                  input/output per the project's routing table at stream-render time.
                  The Pipeline CR itself is never mutated. F50.2.
                properties:
                  name:
                    description: Name is the PipelineProject name in this namespace.
                    type: string
                required:
                - name
                type: object
              rawYAML:
                description: |-
                  RawYAML holds a complete Redpanda Connect config in native YAML format.
                  When set, Input, Processors, and Output are ignored; no catalog validation
                  is performed. The HTTP server block is injected automatically if absent.
                type: string
              replicas:
                default: 1
                description: 'v0.1: only single-replica pipelines. Multi-replica is
                  v0.4+.'
                format: int32
                maximum: 1
                minimum: 1
                type: integer
              secretRefs:
                description: |-
                  SecretRefs maps Kubernetes Secret keys to environment variables injected
                  into the pipeline Pod. Reference them in RPC YAML as ${ENV_VAR}.
                items:
                  description: |-
                    SecretRef binds a Kubernetes Secret key to an environment variable name
                    that is injected into the pipeline Pod container. Reference the variable
                    in RPC YAML as ${ENV_VAR}.
                  properties:
                    envVar:
                      description: |-
                        EnvVar is the environment variable name exposed to the RPC process.
                        Must match [A-Za-z_][A-Za-z0-9_]*.
                      pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                      type: string
                    key:
                      description: Key is the key within the Secret's data map.
                      type: string
                    secretName:
                      description: SecretName is the name of the Kubernetes Secret
                        in the same namespace.
                      type: string
                  required:
                  - envVar
                  - key
                  - secretName
                  type: object
                type: array
              stopped:
                default: false
                description: |-
                  Stopped, when true, signals the operator to delete the pipeline pod
                  and keep it absent. The Pipeline CR (and its ConfigMap/PodMonitor)
                  remain in place. Toggle back to false to resume the pipeline.
                  F45: stop/run a pipeline without deleting the CR.
                type: boolean
            type: object
          status:
            description: PipelineStatus defines the observed state of Pipeline.
            properties:
              assignedCluster:
                description: |-
                  AssignedCluster is the PipelineCluster the pipeline's stream currently runs
                  on; empty in pod mode. F47 Phase 2.
                type: string
              assignedInstance:
                description: |-
                  AssignedInstance is the cluster pod (e.g. etl-small-1) hosting the stream;
                  empty in pod mode. F47 Phase 2.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: PipelinePhase reports the high-level lifecycle stage
                  of a Pipeline's pod.
                enum:
                - Pending
                - Running
                - Failed
                - Stopped
                type: string
              podName:
                type: string
              streamConfigHash:
                description: |-
                  StreamConfigHash is a hash of the stream config (placement + rendered body)
                  last successfully deployed. The reconciler skips re-deploying the stream on a
                  periodic resync when this still matches the desired config, avoiding an
                  unnecessary tear-down/recreate every reconcile.
                type: string
              streamID:
                description: |-
                  StreamID is the deployed stream ID (= pipeline name); empty in pod mode.
                  F47 Phase 2.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
